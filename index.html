<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery & BackBet Calculator + Screenshot Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{
--bg:#0a0f0d;
--card:#121a16;
--card-border:#1e2e24;
--accent:#2ecc40;
--accent-dim:#1a7a28;
--text:#e8f0ea;
--text-dim:#7a9a82;
--warning:#f39c12;
--danger:#e74c3c;
--input-bg:#0d1410;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
padding:20px;
}

.container{
max-width:700px;
margin:0 auto;
}

.section{
background:var(--card);
border:1px solid var(--card-border);
border-radius:12px;
padding:20px;
margin-bottom:16px;
}

.section-label{
font-family:'Space Mono',monospace;
font-size:12px;
color:var(--text-dim);
margin-bottom:10px;
}

input[type="number"],input[type="file"]{
width:100%;
background:var(--input-bg);
border:1px solid var(--card-border);
border-radius:8px;
padding:10px;
color:white;
margin-bottom:10px;
}

button{
width:100%;
background:var(--accent);
border:none;
padding:12px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.result-card{
border:1px solid var(--card-border);
padding:10px;
border-radius:8px;
margin-top:10px;
}

.match{
margin-bottom:15px;
padding:10px;
border:1px solid var(--card-border);
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Screenshot Hedge Analyzer</h2>

<div class="section">

<div class="section-label">Upload Football Odds Screenshot</div>

<input type="file" id="imageUpload" accept="image/*">

<button onclick="processScreenshot()">Analyse Screenshot</button>

<div id="matchResults"></div>

</div>


<div class="section">

<div class="section-label">Manual Calculator</div>

<label>Home Odd</label>
<input type="number" id="homeOdd" step="0.01">

<label>Draw Odd</label>
<input type="number" id="drawOdd" step="0.01">

<label>Target Profit</label>
<input type="number" id="profit" value="1000">

<button onclick="calculate()">Calculate</button>

<div id="manualResult"></div>

</div>

</div>

<script>

function fmt(n){
return "₦"+Math.round(n).toLocaleString();
}

function hedgeCalc(recovery,backbet,profit){

let denom=(backbet-1)*(recovery-1)-1;

if(denom<=0) return null;

let B=profit/denom;
let R=B*(backbet-1);

return {R,B};

}


async function processScreenshot(){

const file=document.getElementById("imageUpload").files[0];

if(!file){
alert("Upload screenshot first");
return;
}

document.getElementById("matchResults").innerHTML="Reading screenshot...";

const result=await Tesseract.recognize(file,"eng");

const text=result.data.text;

analyseOdds(text);

}


function analyseOdds(text){

const numbers=text.match(/\d+\.\d+/g);

let output="";

let profit=1000;

for(let i=0;i<numbers.length;i+=3){

let odds=[
parseFloat(numbers[i]),
parseFloat(numbers[i+1]),
parseFloat(numbers[i+2])
];

if(odds.length<3) continue;

let sorted=[...odds].sort((a,b)=>a-b);

let recovery=sorted[0];

let backbet=sorted[1];

let calc=hedgeCalc(recovery,backbet,profit);

if(!calc) continue;

output+=`
<div class="match">

<b>Odds:</b> ${odds.join(" | ")}<br>

Recovery Odd (lowest): <b>${recovery}</b><br>
BackBet Odd (second lowest): <b>${backbet}</b><br><br>

Recovery Stake: <b>${fmt(calc.R)}</b><br>
BackBet Stake: <b>${fmt(calc.B)}</b>

</div>
`;

}

document.getElementById("matchResults").innerHTML=output || "No odds detected.";

}



function calculate(){

const homeOdd=parseFloat(document.getElementById("homeOdd").value);
const drawOdd=parseFloat(document.getElementById("drawOdd").value);
const profit=parseFloat(document.getElementById("profit").value);

let calc=hedgeCalc(homeOdd,drawOdd,profit);

if(!calc){
document.getElementById("manualResult").innerHTML="Invalid odds combination.";
return;
}

document.getElementById("manualResult").innerHTML=`
<div class="result-card">
Recovery Stake: ${fmt(calc.R)}<br>
BackBet Stake: ${fmt(calc.B)}
</div>
`;

}

</script>

</body>
</html>
